<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar System Explorer 🚀</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#000;
      color:#fff;
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      overflow-x:hidden;
    }

    /* ===== HEADER ===== */
    header {
      width:100%;
      text-align:center;
      padding:14px 0 6px;
      background:linear-gradient(180deg,rgba(10,10,40,1),transparent);
      position:relative;
      z-index:10;
    }
    header h1 {
      font-size:2rem;
      letter-spacing:4px;
      background:linear-gradient(90deg,#ff9500,#ffe066,#ff9500);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:none;
    }
    header p { color:#aaa; font-size:0.82rem; letter-spacing:2px; margin-top:2px; }

    /* ===== CANVAS AREA ===== */
    #solarCanvas {
      display:block;
      cursor:pointer;
    }

    /* ===== FACT CARD ===== */
    #factCard {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0.8);
      background:linear-gradient(135deg,rgba(10,10,40,0.97),rgba(5,5,25,0.98));
      border:2px solid;
      border-radius:20px;
      padding:28px 32px;
      max-width:380px;
      width:90%;
      z-index:100;
      opacity:0;
      pointer-events:none;
      transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      text-align:center;
    }
    #factCard.show {
      opacity:1;
      pointer-events:all;
      transform:translate(-50%,-50%) scale(1);
    }
    #factCard h2 { font-size:1.6rem; margin-bottom:10px; }
    #factCard .planet-icon { font-size:3.5rem; margin-bottom:10px; }
    #factCard p  { color:#ccc; font-size:0.92rem; line-height:1.6; }
    #factCard .facts-list { margin-top:12px; text-align:left; }
    #factCard .facts-list li { color:#aef; font-size:0.85rem; margin:5px 0; list-style:none; padding-left:16px; position:relative; }
    #factCard .facts-list li::before { content:'🌟'; position:absolute; left:-2px; font-size:0.7rem; top:2px; }
    #closeCard {
      margin-top:18px;
      padding:8px 28px;
      border:none;
      border-radius:50px;
      background:linear-gradient(135deg,#ff9500,#ffe066);
      color:#000;
      font-weight:bold;
      cursor:pointer;
      font-size:0.9rem;
    }
    #overlay {
      position:fixed;inset:0;
      background:rgba(0,0,0,0.6);
      z-index:99;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.3s;
    }
    #overlay.show { opacity:1; pointer-events:all; }

    /* ===== QUIZ PANEL ===== */
    #quizPanel {
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0.85);
      background:linear-gradient(135deg,rgba(5,10,40,0.98),rgba(0,5,20,0.98));
      border:2px solid #a29bfe;
      border-radius:20px;
      padding:28px 32px;
      max-width:400px;
      width:92%;
      z-index:100;
      opacity:0;
      pointer-events:none;
      transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      text-align:center;
    }
    #quizPanel.show { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
    #quizPanel h2 { color:#a29bfe; font-size:1.4rem; margin-bottom:14px; }
    #quizQuestion { font-size:1rem; color:#eee; margin-bottom:18px; line-height:1.5; }
    .quiz-opt {
      display:block;
      width:100%;
      margin:7px 0;
      padding:10px 16px;
      border:2px solid rgba(162,155,254,0.4);
      border-radius:12px;
      background:rgba(162,155,254,0.08);
      color:#fff;
      cursor:pointer;
      font-size:0.9rem;
      text-align:left;
      transition:all 0.2s;
    }
    .quiz-opt:hover { background:rgba(162,155,254,0.2); border-color:#a29bfe; }
    .quiz-opt.correct { background:rgba(0,200,100,0.25); border-color:#00c864; color:#00ff88; }
    .quiz-opt.wrong   { background:rgba(255,50,50,0.2);  border-color:#ff3232; color:#ff8888; }
    #quizFeedback { margin-top:12px; font-size:1.1rem; min-height:24px; }
    #quizScore { color:#ffeaa7; font-size:0.85rem; margin-top:8px; }
    #quizClose { margin-top:14px; padding:8px 24px; border:none; border-radius:50px; background:linear-gradient(135deg,#a29bfe,#6c5ce7); color:#fff; font-weight:bold; cursor:pointer; }
    #quizNext  { margin-top:8px; padding:8px 24px; border:none; border-radius:50px; background:linear-gradient(135deg,#00cec9,#55efc4); color:#000; font-weight:bold; cursor:pointer; display:none; }

    /* ===== CONTROLS ===== */
    .controls {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      padding:14px 12px 18px;
      max-width:860px;
    }
    button.ctrl {
      padding:9px 18px;
      border:none;
      border-radius:50px;
      font-size:0.82rem;
      font-weight:bold;
      cursor:pointer;
      letter-spacing:0.5px;
      transition:all 0.2s;
      box-shadow:0 3px 10px rgba(0,0,0,0.3);
    }
    button.ctrl:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.4); }
    button.ctrl:active { transform:translateY(0); }

    .c1  { background:linear-gradient(135deg,#ff9500,#ffe066); color:#000; }
    .c2  { background:linear-gradient(135deg,#74b9ff,#0984e3); color:#fff; }
    .c3  { background:linear-gradient(135deg,#00cec9,#55efc4); color:#000; }
    .c4  { background:linear-gradient(135deg,#fd79a8,#e84393); color:#fff; }
    .c5  { background:linear-gradient(135deg,#a29bfe,#6c5ce7); color:#fff; }
    .c6  { background:linear-gradient(135deg,#ffeaa7,#fdcb6e); color:#000; }
    .c7  { background:linear-gradient(135deg,#55efc4,#00b894); color:#000; }
    .c8  { background:linear-gradient(135deg,#ff7675,#d63031); color:#fff; }
    .c9  { background:linear-gradient(135deg,#636e72,#2d3436); color:#fff; }
    .c10 { background:linear-gradient(135deg,#e17055,#d63031); color:#fff; }

    /* HUD */
    #hud {
      position:absolute;
      bottom:10px; left:12px;
      font-size:0.75rem;
      color:rgba(255,255,255,0.5);
      pointer-events:none;
    }
    #speedHud {
      position:absolute;
      bottom:10px;right:12px;
      font-size:0.75rem;
      color:rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 SOLAR SYSTEM EXPLORER</h1>
  <p>Click any planet to learn about it!</p>
</header>

<canvas id="solarCanvas"></canvas>

<div class="controls">
  <button class="ctrl c1" onclick="speedUp()">⚡ Speed Up</button>
  <button class="ctrl c2" onclick="slowDown()">🐢 Slow Down</button>
  <button class="ctrl c3" onclick="toggleLabels()">🏷️ Labels</button>
  <button class="ctrl c4" onclick="toggleOrbits()">⭕ Orbits</button>
  <button class="ctrl c5" onclick="toggleMoons()">🌙 Moons</button>
  <button class="ctrl c6" onclick="toggleAsteroid()">☄️ Asteroids</button>
  <button class="ctrl c7" onclick="toggleComet()">🌠 Comet</button>
  <button class="ctrl c8" onclick="startQuiz()">🧠 Quiz!</button>
  <button class="ctrl c9" onclick="zoomIn()">🔭 Zoom In</button>
  <button class="ctrl c9" onclick="zoomOut()">🔍 Zoom Out</button>
  <button class="ctrl c10" onclick="resetView()">🔄 Reset</button>
</div>

<!-- Fact Card -->
<div id="overlay" onclick="closeCard()"></div>
<div id="factCard">
  <div class="planet-icon" id="factIcon"></div>
  <h2 id="factTitle"></h2>
  <p id="factDesc"></p>
  <ul class="facts-list" id="factsList"></ul>
  <button id="closeCard" onclick="closeCard()">Got it! ✓</button>
</div>

<!-- Quiz Panel -->
<div id="quizPanel">
  <h2>🧠 Planet Quiz!</h2>
  <div id="quizQuestion"></div>
  <div id="quizOptions"></div>
  <div id="quizFeedback"></div>
  <div id="quizScore"></div>
  <button id="quizNext" onclick="nextQuestion()">Next ➡️</button>
  <button id="quizClose" onclick="closeQuiz()">Close</button>
</div>

<script src="burger.js"></script>
</body>
</html>
